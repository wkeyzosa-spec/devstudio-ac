{% extends "base.html" %}
{% block title %}Accedi · DEV STUDIO AC{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-box">
    <h2>Bentornato</h2>
    <p class="sub">Accedi al tuo account DEV STUDIO AC</p>
    <form method="POST">
      <div class="field">
        <label>EMAIL / ADMIN</label>
        <input type="text" name="email" placeholder="La tua email" required>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:4px">Accedi</button>
    </form>
    <div class="auth-alt">
      Non hai un account? <a href="{{ url_for('register') }}">Registrati</a>
    </div>
  </div>
</div>

{% endblock %}
