{% extends "base.html" %}
{% block title %}Registrati · DEV STUDIO AC{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-box">
    <h2>Crea Account</h2>
    <p class="sub">Registrati per acquistare e gestire le tue licenze</p>
    <form method="POST">
      <div class="field">
        <label>EMAIL</label>
        <input type="email" name="email" placeholder="La tua email" required>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
      </div>
      <div class="field">
        <label>DISCORD (opzionale)</label>
        <input type="text" name="discord" placeholder="user#0000">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:4px">Registrati</button>
    </form>
    <div class="auth-alt">
      Hai già un account? <a href="{{ url_for('login') }}">Accedi</a>
    </div>
  </div>
</div>

{% endblock %}
